<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attendance/Feedback Form</title>
<link rel="icon" type="image/svg+xml" href="MGFlogo.svg">
<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="form-header">
<img src="MGFlogo.svg" class="logo" alt="MGF Logo">
<h1>Attendance / Feedback Form</h1>
</div>

<form id="attendanceForm">

<div class="input-group">
<label>Name</label>
<input name="name" type="text" placeholder="Enter your name" required>
</div>

<div class="input-group">
<label>Email</label>
<input name="email" type="email" placeholder="Enter your email" required>
</div>

<div class="input-group">
<label>Factory Name</label>
<input name="factory" type="text" placeholder="Enter factory name" required>
</div>

<div class="input-group">
<label>Date</label>
<input name="date" type="date" required>
</div>

<div class="input-group">
<label>Feedback (optional)</label>
<textarea name="feedback" placeholder="Enter your feedback..."></textarea>
</div>

<button type="submit" id="submitBtn">
<span class="btn-text">Submit</span>
<span class="spinner"></span>
</button>

</form>

</div>

<script src="script.js"></script>

</body>

</html>
